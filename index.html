<body class="bg-gray-900 text-gray-100 p-4 font-sans">

  <div id="all-contents" class="max-w-4xl mx-auto">

        <h1 class="text-white text-2xl font-bold">tuff website</h1>
        <ul class="flex space-x-4" id="nav-ul">
          <li class="nav-li"><a class="text-white hover:bg-sky-900 hover:text-blue-200 px-3 py-2 rounded" href="index.html">Home</a></li>
          <li class="nav-li"><a class="text-white hover:bg-sky-900 hover:text-blue-200 px-3 py-2 rounded" href="portfolio.html">Portfolio</a></li>

        <div class="md:w-1/3">

          </div>

        <div class="flex flex-wrap gap-4">
